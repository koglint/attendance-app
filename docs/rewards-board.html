<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewards Board</title>
    <style>
        :root {
            --bg: #16324f;
            --panel: #214b72;
            --accent: #f3c623;
            --line: rgba(255, 255, 255, 0.18);
            --text: #f7fbff;
            --muted: rgba(247, 251, 255, 0.78);
            --goat: #f5cf5c;
            --sad1: #c2e46d;
            --sad2: #ffca6c;
            --sad3: #ff9966;
            --sad4: #ef6f6c;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", system-ui, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(243, 198, 35, 0.18), transparent 28%),
                linear-gradient(135deg, #13304a 0%, var(--bg) 40%, #10253b 100%);
            color: var(--text);
        }

        body {
            padding: 10px;
        }

        .app {
            height: calc(100vh - 20px);
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 10px;
        }

        .topbar,
        .controls,
        .panel {
            background: rgba(33, 75, 114, 0.92);
            border: 1px solid var(--line);
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 14px;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 0;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(1.05rem, 1.5vw, 1.35rem);
            line-height: 1.1;
        }

        .brand span {
            color: var(--muted);
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.82rem;
        }

        .tag.active {
            background: var(--accent);
            color: #18232f;
            border-color: transparent;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 10px;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        select, button {
            width: 100%;
            min-height: 40px;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 0 12px;
            font: inherit;
        }

        select {
            background: rgba(255, 255, 255, 0.96);
            color: #173451;
        }

        button {
            cursor: pointer;
            background: var(--accent);
            color: #18232f;
            font-weight: 700;
            border: none;
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text);
            border: 1px solid var(--line);
        }

        .content {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(500px, 48%) minmax(0, 1fr);
            gap: 10px;
        }

        .panel {
            min-height: 0;
            padding: 12px;
        }

        .wheel-panel {
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            gap: 10px;
            justify-items: center;
        }

        .wheel-head {
            width: 100%;
            display: grid;
            gap: 4px;
            padding: 4px 2px 0;
            text-align: left;
        }

        .wheel-head strong {
            display: block;
            font-size: 1rem;
        }

        .wheel-head span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .winner-result {
            width: 100%;
            text-align: center;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.95rem;
        }

        .wheel-wrap {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            min-height: 0;
            padding: 4px;
            position: relative;
        }

        canvas {
            width: min(100%, 71vh);
            height: auto;
            max-height: 100%;
            aspect-ratio: 1 / 1;
            background: #f6f7fb;
            border-radius: 50%;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
        }

        .wheel-spin {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 112px;
            height: 112px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.94);
            background: radial-gradient(circle at 30% 30%, #ffe37f, var(--accent) 68%, #e0a600 100%);
            color: #18232f;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
            z-index: 3;
        }

        .wheel-spin:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .wheel-note {
            width: 100%;
            display: grid;
            gap: 8px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .weights {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .weight-pill {
            border-radius: 999px;
            padding: 5px 9px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            white-space: nowrap;
        }

        .list-panel {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 10px;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .list-header h2 {
            margin: 0;
            font-size: 1rem;
        }

        .count {
            color: var(--muted);
            font-size: 0.84rem;
        }

        .student-grid {
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px 10px;
            align-content: start;
        }

        .student-card {
            min-width: 0;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .student-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .status-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            display: block;
        }

        .overlay,
        .popup {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .overlay.show,
        .popup.show {
            display: flex;
        }

        .overlay {
            background: rgba(8, 19, 31, 0.56);
            backdrop-filter: blur(6px);
        }

        .loading-card,
        .popup-card {
            min-width: min(92vw, 360px);
            max-width: min(92vw, 520px);
            padding: 20px 22px;
            border-radius: 22px;
            background: rgba(22, 50, 79, 0.96);
            border: 1px solid var(--line);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .loading-card {
            display: grid;
            justify-items: center;
            gap: 12px;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent);
            animation: spin 900ms linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .popup {
            background: rgba(8, 19, 31, 0.52);
            backdrop-filter: blur(8px);
        }

        .popup-card h2 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 2vw, 2rem);
        }

        .popup-card p {
            margin: 6px 0;
        }

        .popup-name {
            font-size: clamp(1.6rem, 3vw, 2.6rem);
            font-weight: 800;
            color: var(--accent);
            margin: 10px 0 6px;
        }

        .popup-burst {
            font-size: 2rem;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }

        .empty {
            display: grid;
            place-items: center;
            min-height: 0;
            color: var(--muted);
            text-align: center;
            padding: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 14px;
        }

        @media (max-width: 1100px) {
            .controls {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .content {
                grid-template-columns: 1fr;
            }

            .student-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 720px) {
            html, body {
                overflow: auto;
            }

            .app {
                height: auto;
                min-height: calc(100vh - 20px);
            }

            .topbar,
            .nav,
            .wheel-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .controls,
            .student-grid {
                grid-template-columns: 1fr;
            }

            .wheel-spin {
                width: 92px;
                height: 92px;
                font-size: 1rem;
            }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>
    <script>
        window.BACKEND_BASE_URL = "https://attendance-app-lfwc.onrender.com";
    </script>
    <script defer src="./firebase-init.js"></script>
</head>
<body>
    <div class="app">
        <section class="topbar">
            <div class="brand">
                <h1>Attendance App</h1>
                <span>Rewards Board</span>
            </div>
            <nav class="nav">
                <a class="tag active" href="./rewards-board.html">Board</a>
                <a class="tag" href="./teacher.html">Attendance Data</a>
                <a class="tag" href="./leaderboard.html">Leaderboard</a>
                <a class="tag" href="./admin.html">Admin</a>
                <a class="tag" href="./faq.html">FAQs</a>
            </nav>
        </section>

        <section class="controls">
            <label>Year
                <select id="yearSelect"></select>
            </label>
            <label>Term
                <select id="termSelect">
                    <option value="1">Term 1</option>
                    <option value="2">Term 2</option>
                    <option value="3">Term 3</option>
                    <option value="4">Term 4</option>
                </select>
            </label>
            <label>Week
                <select id="weekSelect">
                </select>
            </label>
            <label>Roll Class
                <select id="rollClass"></select>
            </label>
        </section>

        <section class="content">
            <section class="panel wheel-panel">
                <div class="wheel-head">
                    <strong id="boardInfo">No class loaded yet.</strong>
                    <span id="winnerDisplay">Load a class to start.</span>
                </div>
                <div class="wheel-wrap">
                    <canvas id="wheelCanvas" width="840" height="840"></canvas>
                    <button id="spinButton" class="wheel-spin" type="button">Spin</button>
                </div>
                <div class="winner-result" id="winnerResult">No winner selected yet.</div>
                <div class="wheel-note">
                    <div id="weightInfo" class="weights"></div>
                </div>
            </section>

            <section class="panel list-panel">
                <div class="list-header">
                    <h2>Students and Status</h2>
                    <div class="count" id="studentCount">0 students</div>
                </div>
                <div id="studentList" class="student-grid"></div>
            </section>
        </section>
    </div>

    <div id="loadingOverlay" class="overlay" aria-hidden="true">
        <div class="loading-card">
            <div class="spinner" aria-hidden="true"></div>
            <strong>Loading board</strong>
            <div>Fetching the latest class data.</div>
        </div>
    </div>

    <div id="winnerPopup" class="popup" aria-hidden="true">
        <div class="popup-card">
            <div class="popup-burst">***</div>
            <h2>Winner!</h2>
            <div id="popupWinnerName" class="popup-name">-</div>
            <button id="closePopupBtn" type="button">Close</button>
        </div>
    </div>

    <script type="module" src="./rewards-board.js"></script>
</body>
</html>
