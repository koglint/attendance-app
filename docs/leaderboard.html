<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <base href="./" />
    <title>Leaderboard - Roll-Call Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 1rem 2rem;
            background: #274472;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .brand {
            display: flex;
            gap: .75rem;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .brand span {
            opacity: .85;
            font-size: .85rem;
        }

        .nav {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        fieldset {
            border: 1px solid #e7f802;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1.2rem;
        }

        button {
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #e7f802;
            padding: .6rem;
            text-align: center;
            vertical-align: middle;
            justify-items: center;
        }

        th {
            position: sticky;
            top: 0;
            background: #274472;
        }

        .muted {
            color: #fff;
            opacity: .85;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
        }

        .right {
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            margin-right: 1rem;
        }

        .badge img {
            width: 40px;
            height: 40px;
            display: block;
        }

        .tag {
            border: 1px solid #e7f802;
            border-radius: 999px;
            padding: .3rem .6rem;
            text-decoration: none;
            color: #fff;
            font-size: .85rem;
        }

        tr.top-glow {
            position: relative;
            z-index: 1;
            animation: diamondPulse 2400ms ease-in-out infinite;
            box-shadow: 0 0 32px 8px rgba(232, 220, 3, 0.5);
        }

        @keyframes diamondPulse {
            0%,
            100% {
                box-shadow: 0 0 32px 8px rgba(0, 255, 255, 0.0);
            }

            50% {
                box-shadow: 0 0 48px 16px rgba(239, 231, 0, 0.7);
            }
        }

        tr.top-glow td {
            position: relative;
            z-index: 1;
            animation: innerDiamondPulse 2400ms ease-in-out infinite;
            box-shadow: inset 0 0 32px 8px rgba(0, 255, 255, 0.3);
        }

        @keyframes innerDiamondPulse {
            0%,
            100% {
                box-shadow: inset 0 0 32px 8px rgba(0, 255, 255, 0.0);
            }

            50% {
                box-shadow: inset 0 0 48px 16px rgba(0, 255, 255, 0.5);
            }
        }
    </style>

    <script>window.BACKEND_BASE_URL = "https://attendance-app-lfwc.onrender.com";</script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
    <script src="./firebase-init.js" defer></script>
    <script type="module" src="./leaderboard.js"></script>
</head>

<body>
    <header>
        <div class="brand">
            <h1>Attendance App</h1>
            <span>Leaderboard</span>
        </div>
        <nav class="nav">
            <a class="tag" href="./rewards-board.html">Board</a>
            <a class="tag" href="./teacher.html">Teacher</a>
            <a class="tag" href="./leaderboard.html">Leaderboard</a>
            <a class="tag" href="./rewards.html">Spinner</a>
            <a class="tag" href="./admin.html">Admin</a>
            <a class="tag" href="./student.html">Student</a>
        </nav>
    </header>

    <fieldset>
        <legend>Filters</legend>
        <div class="controls">
            <label>Year<br>
                <select id="yearSelect"></select>
            </label>
            <label>Term<br>
                <select id="termSelect">
                    <option value="1">Term 1</option>
                    <option value="2">Term 2</option>
                    <option value="3">Term 3</option>
                    <option value="4">Term 4</option>
                </select>
            </label>
            <button id="loadBtn" type="button">Load leaderboard</button>
            <span id="status" class="muted"></span>
        </div>
    </fieldset>

    <fieldset>
        <legend>Class rankings (normalised points)</legend>
        <table id="board" aria-live="polite">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Roll class</th>
                    <th class="right" title="(goat=4, sad1=3, sad2=2, sad3=1, sad4=0) divided by students">Norm points</th>
                    <th title="Goat"><img src="assets/trend/goldenGoat.svg" alt="Goat" style="width:64px;height:64px;vertical-align:middle;"></th>
                    <th title="Sad 1"><img src="assets/trend/sad1.svg" alt="Sad 1" style="width:64px;height:64px;vertical-align:middle;"></th>
                    <th title="Sad 2"><img src="assets/trend/sad2.svg" alt="Sad 2" style="width:64px;height:64px;vertical-align:middle;"></th>
                    <th title="Sad 3"><img src="assets/trend/sad3.svg" alt="Sad 3" style="width:64px;height:64px;vertical-align:middle;"></th>
                    <th title="Sad 4"><img src="assets/trend/sad4.svg" alt="Sad 4" style="width:64px;height:64px;vertical-align:middle;"></th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </fieldset>

    <fieldset>
        <legend>Legend</legend>
        <div class="muted">
            <span class="badge"><img src="assets/trend/goldenGoat.svg" alt="goat">On time 4/4 days (4 points)</span>
            <span class="badge"><img src="assets/trend/sad1.svg" alt="sad1">On time 3/4 days (3 points)</span>
            <span class="badge"><img src="assets/trend/sad2.svg" alt="sad2">On time 2/4 days (2 points)</span>
            <span class="badge"><img src="assets/trend/sad3.svg" alt="sad3">On time 1/4 days (1 point)</span>
            <span class="badge"><img src="assets/trend/sad4.svg" alt="sad4">On time 0/4 days (0 points)</span>
        </div>
    </fieldset>
</body>

</html>
